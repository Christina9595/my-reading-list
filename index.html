<!DOCTYPE html>
<html lang="en">
<head>
   <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Reading List</title>
    
    <!-- Links your site to your custom phone app configuration settings -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2d1f3d">
    
    <script>
        // Tells the browser to activate the offline engine background script
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Reading List</title>
    
    <style>
        /* Using standard, built-in fonts temporarily to completely clear the Chrome block */
        body { 
            font-family: 'Georgia', serif; 
            max-width: 400px; 
            margin: 50px auto; 
            padding: 20px; 
            background-color: #2d1f3d !important; /* Your deep dark purple background */
            color: white;
        }
        
        h1 { 
            text-align: center; 
            margin-bottom: 5px;
        }

        h2 {
            color: #ebdcf7;
            font-size: 1.3rem;
            margin-top: 30px;
            margin-bottom: 10px;
            border-bottom: 1px solid #8a4fff;
            padding-bottom: 5px;
        }
        
        /* Safe input layout panel */
        .input-panel {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        input, select { 
            padding: 10px; 
            border: 1px solid #bba3d0; 
            border-radius: 4px; 
            font-family: inherit;
            background-color: #ebdcf7; 
            color: black;
        }
        
        .add-btn { 
            padding: 10px 15px; 
            background-color: #8a4fff !important; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            font-weight: bold;
            font-family: inherit;
        }
        
        ul { 
            list-style: none; 
            padding: 0; 
            margin-bottom: 20px;
        }
        
        li { 
            background: #ebdcf7; 
            color: black;
            padding: 12px; 
            margin-bottom: 8px; 
            border-radius: 4px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-shadow: 0 2px 4px rgba(138, 79, 255, 0.15); 
        }
        
        .delete-btn { 
            background: #ff3333; 
            color: white; 
            border: none; 
            padding: 5px 10px; 
            border-radius: 3px; 
            cursor: pointer; 
        }

        .status-btn {
            padding: 4px 8px; 
            background: #8a4fff; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            font-size: 11px; 
            cursor: pointer;
            margin-right: 5px;
        }

        .reading-now { border-left: 5px solid #8a4fff; }
        .completed { text-decoration: line-through; opacity: 0.6; }
        .book-content { display: flex; align-items: center; gap: 5px; }

        .genre-tag {
            background-color: #8a4fff;
            color: white;
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 10px;
            margin-left: 5px;
        }

        .filter-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
            color: #ebdcf7;
            font-weight: bold;
        }
        .filter-section select { width: 60%; }
    </style>
</head>
<body>

    <h1> My TBR Tracker</h1>
    
    <!-- Using a basic layout block instead of a form wrapper to stop Chrome refresh freezing -->
    <div class="input-panel">
        <input type="text" id="bookInput" placeholder="Book title...">
        <input type="text" id="authorInput" placeholder="Author...">
        <select id="genreInput">
            <option value="Fantasy">Fantasy</option>
            <option value="Romance">Romance</option>
            <option value="Thriller">Thriller</option>
            <option value="Sci-Fi">Sci-Fi</option>
            <option value="Mystery">Mystery</option>
            <option value="Other">Other</option>
        </select>
        <button type="button" class="add-btn" id="addBtn">Add Book</button>
    </div>

    <p id="counter" style="text-align: center; font-weight: bold; color: #ebdcf7; margin-bottom: 20px;"></p>

    <div class="filter-section">
        <label for="genreFilter">Filter Shelf By:</label>
        <select id="genreFilter" id="genreFilterMenu">
            <option value="All">All Books</option>
            <option value="Fantasy">Fantasy</option>
            <option value="Romance">Romance</option>
            <option value="Thriller">Thriller</option>
            <option value="Sci-Fi">Sci-Fi</option>
            <option value="Mystery">Mystery</option>
            <option value="Other">Other</option>
        </select>
    </div>

    <h2>⚔️ To-Be-Read Quest</h2>
    <ul id="bookList"></ul>

    <h2>🔮 Current Quest</h2>
    <ul id="readingList"></ul>

    <h2>📜 Completed Chronicles</h2>
    <ul id="completedList"></ul>

    <script>
        // Internal variables only—no storage commands for security filters to block
        let books = [];

        const input = document.getElementById('bookInput');
        const authorInput = document.getElementById('authorInput');
        const genreInput = document.getElementById('genreInput'); 
        const genreFilter = document.getElementById('genreFilter'); 
        const list = document.getElementById('bookList');
        const readingList = document.getElementById('readingList'); 
        const completedList = document.getElementById('completedList');
        const counter = document.getElementById('counter');
        const addBtn = document.getElementById('addBtn');

        function showBooks() {
            list.innerHTML = '';
            readingList.innerHTML = '';
            completedList.innerHTML = '';
            
            let unreadCount = 0;
            const currentFilter = genreFilter.value; 

            books.forEach((book, index) => {
                const bookGenre = book.genre || 'Other';
                if (currentFilter !== 'All' && bookGenre !== currentFilter) return; 

                const li = document.createElement('li');
                let completedClass = '';
                let statusLabel = 'Start';
                
                if (book.status === 1) {
                    li.classList.add('reading-now');
                    statusLabel = 'Finish';
                } else if (book.status === 2) {
                    completedClass = 'completed';
                    statusLabel = 'Reread';
                }

                li.innerHTML = `
                    <div class="book-content ${completedClass}">
                        <button type="button" class="status-btn" onclick="advanceStatus(${index})">${statusLabel}</button>
                        <span><strong>${book.title}</strong> by ${book.author} <span class="genre-tag">${bookGenre}</span></span>
                    </div>
                    <button type="button" class="delete-btn" onclick="removeBook(${index})">X</button>
                `;

                if (book.status === 1) {
                    readingList.appendChild(li);
                } else if (book.status === 2) {
                    completedList.appendChild(li);
                } else {
                    list.appendChild(li);
                    unreadCount++; 
                }
            });

            if (list.innerHTML === '') {
                list.innerHTML = '<li style="background: rgba(235, 220, 247, 0.2); color: #ebdcf7; box-shadow: none; justify-content: center;">No matching active quests.</li>';
            }
            if (readingList.innerHTML === '') {
                readingList.innerHTML = '<li style="background: rgba(235, 220, 247, 0.2); color: #ebdcf7; box-shadow: none; justify-content: center;">No matching magical journeys.</li>';
            }
            if (completedList.innerHTML === '') {
                completedList.innerHTML = '<li style="background: rgba(235, 220, 247, 0.2); color: #ebdcf7; box-shadow: none; justify-content: center;">No matching chronicles completed.</li>';
            }

            if (currentFilter === 'All') {
                counter.innerText = `You have ${unreadCount} total unread book quests remaining!`;
            } else {
                counter.innerText = `You have ${unreadCount} unread ${currentFilter} book quests remaining!`;
            }
        }

        // Direct clickable action handler
        addBtn.onclick = function() {
            const newTitle = input.value.trim();
            const newAuthor = authorInput.value.trim();
            const newGenre = genreInput.value;

            if (!newTitle || !newAuthor) {
                alert("Please fill out both the Title and Author fields!");
                return;
            }

            let isDuplicate = false;
            for(let i=0; i<books.length; i++) {
                if(books[i].title && books[i].title.toLowerCase() === newTitle.toLowerCase()) {
                    isDuplicate = true;
                }
            }

            if (isDuplicate) {
                alert(`"${newTitle}" is already on your reading list!`);
                return; 
            }

            books.push({
                title: newTitle,
                author: newAuthor,
                genre: newGenre, 
                status: 0 
            });
            
            showBooks();
            input.value = '';
            authorInput.value = '';
        };

        window.advanceStatus = function(index) {
            let bookStatus = books[index].status || 0;
            books[index].status = (bookStatus + 1) % 3;
            showBooks();
        };

        window.removeBook = function(index) {
            books.splice(index, 1);
            showBooks();
        };

        genreFilter.onchange = showBooks;

        showBooks();
    </script>

</body>
</html>
