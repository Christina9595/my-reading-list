<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Reading List</title>
    <!-- Fantasy font link -->
    <link href="https://googleapis.com" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Almendra', serif; 
            max-width: 400px; 
            margin: 50px auto; 
            padding: 20px; 
            background-color: #2d1f3d !important; /* Deep dark purple background */
        }
        
        h1 { 
            color: white; 
            text-align: center; 
            margin-bottom: 5px;
        }

        h2 {
            color: #ebdcf7;
            font-size: 1.3rem;
            margin-top: 30px;
            margin-bottom: 10px;
            border-bottom: 1px solid #8a4fff;
            padding-bottom: 5px;
        }
        
        /* Updated layout box container */
        .input-box { 
            display: flex; 
            flex-direction: column;
            gap: 10px; 
            margin-bottom: 20px; 
        }
        
        input, select { 
            padding: 10px; 
            border: 1px solid #bba3d0; 
            border-radius: 4px; 
            font-family: 'Almendra', serif;
            background-color: #ebdcf7; 
            color: black;
        }
        
        button { 
            padding: 10px 15px; 
            background-color: #8a4fff !important; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            font-family: 'Almendra', serif;
            font-weight: bold;
        }
        
        ul { 
            list-style: none; 
            padding: 0; 
            margin-bottom: 20px;
        }
        
        li { 
            background: #ebdcf7; 
            padding: 12px; 
            margin-bottom: 8px; 
            border-radius: 4px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-shadow: 0 2px 4px rgba(138, 79, 255, 0.15); 
        }
        
        .delete { 
            background: #ff3333; 
            color: white; 
            border: none; 
            padding: 5px 10px; 
            border-radius: 3px; 
            cursor: pointer; 
            font-family: 'Almendra', serif;
        }

        .reading-now {
            border-left: 5px solid #8a4fff; 
        }

        .completed {
            text-decoration: line-through;
            opacity: 0.6;
        }

        .book-content {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .genre-tag {
            background-color: #8a4fff;
            color: white;
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 10px;
            margin-left: 5px;
            display: inline-block;
        }

        .filter-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
            color: #ebdcf7;
            font-weight: bold;
        }
        .filter-section select {
            width: 60%;
        }
    </style>
</head>
<body>

    <h1>📚 My TBR Tracker</h1>
    
    <!-- FIXED: Removed <form> wrapper completely to stop Chrome refresh bugs -->
    <div class="input-box">
        <input type="text" id="bookInput" placeholder="Book title...">
        <input type="text" id="authorInput" placeholder="Author...">
        <select id="genreInput">
            <option value="Fantasy">Fantasy</option>
            <option value="Romance">Romance</option>
            <option value="Thriller">Thriller</option>
            <option value="Sci-Fi">Sci-Fi</option>
            <option value="Mystery">Mystery</option>
            <option value="Other">Other</option>
        </select>
        <!-- Button now calls the action cleanly on click -->
        <button type="button" onclick="handleAddBook()">Add</button>
    </div>

    <p id="counter" style="text-align: center; font-weight: bold; color: #ebdcf7; margin-bottom: 20px;"></p>

    <div class="filter-section">
        <label for="genreFilter">Filter Shelf By:</label>
        <select id="genreFilter" onchange="showBooks()">
            <option value="All">All Books</option>
            <option value="Fantasy">Fantasy</option>
            <option value="Romance">Romance</option>
            <option value="Thriller">Thriller</option>
            <option value="Sci-Fi">Sci-Fi</option>
            <option value="Mystery">Mystery</option>
            <option value="Other">Other</option>
        </select>
    </div>

    <h2>⚔️ To-Be-Read Quest</h2>
    <ul id="bookList"></ul>

    <h2>🔮 Current Quest</h2>
    <ul id="readingList"></ul>

    <h2>📜 Completed Chronicles</h2>
    <ul id="completedList"></ul>

    <script>
        const input = document.getElementById('bookInput');
        const authorInput = document.getElementById('authorInput');
        const genreInput = document.getElementById('genreInput'); 
        const genreFilter = document.getElementById('genreFilter'); 
        const list = document.getElementById('bookList');
        const readingList = document.getElementById('readingList'); 
        const completedList = document.getElementById('completedList');
        const counter = document.getElementById('counter');

        let books = [];

        // Safe storage fetch
        try {
            const saved = localStorage.getItem('myBooks');
            if (saved) {
                books = JSON.parse(saved);
            }
        } catch (e) {
            console.log("Storage read blocked, operating in memory.");
        }

        function saveBooksSecurely() {
            try {
                localStorage.setItem('myBooks', JSON.stringify(books));
            } catch (e) {
                console.log("Storage write blocked.");
            }
        }

        function showBooks() {
            list.innerHTML = '';
            readingList.innerHTML = '';
            completedList.innerHTML = '';
            
            let unreadCount = 0;
            const currentFilter = genreFilter.value; 

            books.forEach((book, index) => {
                const bookGenre = book.genre || 'Other';

                if (currentFilter !== 'All' && bookGenre !== currentFilter) {
                    return; 
                }

                const li = document.createElement('li');
                let completedClass = '';
                let statusLabel = 'Start';
                
                if (book.status === 1) {
                    li.classList.add('reading-now');
                    statusLabel = 'Finish';
                } else if (book.status === 2) {
                    completedClass = 'completed';
                    statusLabel = 'Reread';
                }

                li.innerHTML = `
                    <div class="book-content ${completedClass}">
                        <button style="padding: 4px 8px; background: #8a4fff; color: white; border: none; border-radius: 4px; font-family: 'Almendra'; font-size: 11px; cursor: pointer;" onclick="advanceStatus(${index})">${statusLabel}</button>
                        <span><strong>${book.title}</strong> by ${book.author} <span class="genre-tag">${bookGenre}</span></span>
                    </div>
                    <button class="delete" onclick="removeBook(${index})">X</button>
                `;

                if (book.status === 1) {
                    readingList.appendChild(li);
                } else if (book.status === 2) {
                    completedList.appendChild(li);
                } else {
                    list.appendChild(li);
                    unreadCount++; 
                }
            });

            if (list.innerHTML === '') {
                list.innerHTML = '<li style="background: rgba(235, 220, 247, 0.2); color: #ebdcf7; box-shadow: none; justify-content: center;">No matching active quests.</li>';
            }
            if (readingList.innerHTML === '') {
                readingList.innerHTML = '<li style="background: rgba(235, 220, 247, 0.2); color: #ebdcf7; box-shadow: none; justify-content: center;">No matching magical journeys.</li>';
            }
            if (completedList.innerHTML === '') {
                completedList.innerHTML = '<li style="background: rgba(235, 220, 247, 0.2); color: #ebdcf7; box-shadow: none; justify-content: center;">No matching chronicles completed.</li>';
            }

            if (currentFilter === 'All') {
                counter.innerText = `You have ${unreadCount} total unread book quests remaining!`;
            } else {
                counter.innerText = `You have ${unreadCount} unread ${currentFilter} book quests remaining!`;
            }
        }

        // FIXED: Replaced default submit listener with a direct clean function
        window.handleAddBook = function() {
            const newTitle = input.value.trim();
            const newAuthor = authorInput.value.trim();
            const newGenre = genreInput.value;

            // Basic user alert if they leave fields empty
            if (!newTitle || !newAuthor) {
                alert("Please fill out both the Title and Author fields!");
                return;
            }

            let isDuplicate = false;
            for(let i=0; i<books.length; i++) {
                if(books[i].title && books[i].title.toLowerCase() === newTitle.toLowerCase()) {
                    isDuplicate = true;
                }
            }

            if (isDuplicate) {
                alert(`"${newTitle}" is already on your reading list!`);
                return; 
            }

            books.push({
                title: newTitle,
                author: newAuthor,
                genre: newGenre,
